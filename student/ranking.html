<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Aluno • Ranking</title><link rel="stylesheet" href="../shared/styles.css"/></head><body>
<header class="topbar"><p class="brand">Aluno • Ranking semanal</p><div class="row"><small id="userLabel"></small><button id="logout">Sair</button></div></header>
<div class="wrap"><aside class="sidebar"><a href="home.html">Home</a><a href="courses.html">Cursos & Progresso</a><a href="questions.html">Dúvidas</a><a href="before-after.html">Antes/Depois</a><a class="active" href="ranking.html">Ranking semanal</a><a href="lives.html">Agenda de lives</a></aside>
<main class="content"><section class="card"><h1>Ranking de consistência</h1><table><thead><tr><th>#</th><th>Aluno</th><th>Minutos estudados</th></tr></thead><tbody id="rows"></tbody></table></section></main></div>
<script src="../shared/app.js"></script><script>
const user=App.requireAuth('student'); if(user){document.getElementById('userLabel').textContent=user.name;}
const rank=App.Seed.users.filter(u=>u.role==='student').sort((a,b)=>b.weeklyMinutes-a.weeklyMinutes);
document.getElementById('rows').innerHTML=rank.map((u,i)=>`<tr><td>${i+1}</td><td>${u.name}${u.id===user.id?' (você)':''}</td><td>${u.weeklyMinutes} min</td></tr>`).join('');
document.getElementById('logout').onclick=()=>{App.logout();location.href='../index.html';};
</script></body></html>
