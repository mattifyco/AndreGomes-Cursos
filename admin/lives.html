<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin • Lives</title><link rel="stylesheet" href="../shared/styles.css"/></head><body>
<header class="topbar"><p class="brand">Admin • Agenda de lives</p><div class="row"><small id="userLabel"></small><button id="logout">Sair</button></div></header>
<div class="wrap"><aside class="sidebar"><a href="home.html">Home</a><a href="courses.html">Tabela de cursos</a><a href="students.html">Análise de alunos</a><a href="questions.html">Tabela de dúvidas</a><a href="reviews.html">Antes/Depois</a><a class="active" href="lives.html">Agenda de lives</a></aside>
<main class="content"><section class="card"><h1>Tabela de lives e lembretes</h1><table><thead><tr><th>Live</th><th>Data</th><th>Alunos com lembrete ativo</th></tr></thead><tbody id="rows"></tbody></table></section></main></div>
<script src="../shared/app.js"></script><script>
const user=App.requireAuth('admin'); if(user){document.getElementById('userLabel').textContent=user.name;}
const rem=App.getReminders();
document.getElementById('rows').innerHTML=App.Seed.lives.map(l=>{const count=Object.keys(rem).filter(k=>k.endsWith('_'+l.id)&&rem[k]).length;return `<tr><td>${l.title}</td><td>${l.date}</td><td>${count}</td></tr>`;}).join('');
document.getElementById('logout').onclick=()=>{App.logout();location.href='../index.html';};
App.injectSignature();
</script></body></html>
