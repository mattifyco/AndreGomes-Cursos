<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin • Antes/Depois</title><link rel="stylesheet" href="../shared/styles.css"/></head><body>
<header class="topbar"><p class="brand">Admin • Avaliação antes/depois</p><div class="row"><small id="userLabel"></small><button id="logout">Sair</button></div></header>
<div class="wrap"><aside class="sidebar"><a href="home.html">Home</a><a href="courses.html">Tabela de cursos</a><a href="students.html">Análise de alunos</a><a href="questions.html">Tabela de dúvidas</a><a class="active" href="reviews.html">Antes/Depois</a><a href="lives.html">Agenda de lives</a></aside>
<main class="content"><section class="card"><h1>Tabela de avaliações</h1><table><thead><tr><th>Aluno</th><th>Antes</th><th>Depois</th><th>Status</th><th>Feedback</th><th>Ação</th></tr></thead><tbody id="rows"></tbody></table></section></main></div>
<script src="../shared/app.js"></script><script>
const user=App.requireAuth('admin'); if(user){document.getElementById('userLabel').textContent=user.name;}
function render(){const arr=App.getReviews(); document.getElementById('rows').innerHTML=arr.map(r=>{const su=App.Seed.users.find(u=>u.id===r.userId);return `<tr><td>${su?su.name:'Aluno'}</td><td><a href='${r.before}' target='_blank'>link</a></td><td><a href='${r.after}' target='_blank'>link</a></td><td>${r.status}</td><td>${r.feedback||'-'}</td><td><button onclick="fb('${r.id}')">Feedback</button></td></tr>`;}).join('')||'<tr><td colspan="6">Sem envios.</td></tr>';}
window.fb=(id)=>{const text=prompt('Feedback para o aluno:'); if(!text)return; const arr=App.getReviews().map(r=>r.id===id?{...r,status:'Avaliado',feedback:text}:r); App.setReviews(arr); render();};
render(); document.getElementById('logout').onclick=()=>{App.logout();location.href='../index.html';};
App.injectSignature();
</script></body></html>
