<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin • Cursos</title><link rel="stylesheet" href="../shared/styles.css"/></head><body>
<header class="topbar"><p class="brand">Admin • Tabela de cursos</p><div class="row"><small id="userLabel"></small><button id="logout">Sair</button></div></header>
<div class="wrap"><aside class="sidebar"><a href="home.html">Home</a><a class="active" href="courses.html">Tabela de cursos</a><a href="students.html">Análise de alunos</a><a href="questions.html">Tabela de dúvidas</a><a href="reviews.html">Antes/Depois</a><a href="lives.html">Agenda de lives</a></aside>
<main class="content"><section class="card"><h1>Cursos e estrutura</h1><table><thead><tr><th>Curso</th><th>Módulos</th><th>Total de aulas</th><th>Alunos inscritos</th></tr></thead><tbody id="rows"></tbody></table></section></main></div>
<script src="../shared/app.js"></script><script>
const user=App.requireAuth('admin'); if(user){document.getElementById('userLabel').textContent=user.name;}
document.getElementById('rows').innerHTML=App.Seed.courses.map(c=>`<tr><td>${c.title}</td><td>${c.modules.length}</td><td>${c.modules.reduce((a,m)=>a+m.lessons.length,0)}</td><td>${c.students.length}</td></tr>`).join('');
document.getElementById('logout').onclick=()=>{App.logout();location.href='../index.html';};
App.injectSignature();
</script></body></html>
