<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin • Dúvidas</title><link rel="stylesheet" href="../shared/styles.css"/></head><body>
<header class="topbar"><p class="brand">Admin • Tabela de dúvidas</p><div class="row"><small id="userLabel"></small><button id="logout">Sair</button></div></header>
<div class="wrap"><aside class="sidebar"><a href="home.html">Home</a><a href="courses.html">Tabela de cursos</a><a href="students.html">Análise de alunos</a><a class="active" href="questions.html">Tabela de dúvidas</a><a href="reviews.html">Antes/Depois</a><a href="lives.html">Agenda de lives</a></aside>
<main class="content"><section class="card"><h1>Central de perguntas</h1><table><thead><tr><th>Aluno</th><th>Pergunta</th><th>Auto</th><th>Resposta Admin</th><th>Ação</th></tr></thead><tbody id="rows"></tbody></table></section></main></div>
<script src="../shared/app.js"></script><script>
const user=App.requireAuth('admin'); if(user){document.getElementById('userLabel').textContent=user.name;}
function render(){const arr=App.getQuestions(); document.getElementById('rows').innerHTML=arr.map(q=>{const su=App.Seed.users.find(u=>u.id===q.userId);return `<tr><td>${su?su.name:'Aluno'}</td><td>${q.question}</td><td>${q.auto}</td><td>${q.admin||'Pendente'}</td><td><button onclick="reply('${q.id}')">Responder</button></td></tr>`;}).join('')||'<tr><td colspan="5">Sem perguntas.</td></tr>';}
window.reply=(id)=>{const msg=prompt('Resposta para o aluno:'); if(!msg) return; const arr=App.getQuestions().map(q=>q.id===id?{...q,admin:msg}:q); App.setQuestions(arr); render();};
render(); document.getElementById('logout').onclick=()=>{App.logout();location.href='../index.html';};
</script></body></html>
